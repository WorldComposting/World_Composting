<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    
    <!-- Primary SEO -->
    <title>Essential Composting Gear & Tools | World Composting</title>
    <meta name="description" content="Discover the best worms, bins, and tools for your composting journey via our curated gear list.">
    <meta name="robots" content="index, follow">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://worldcomposting.com/gear">
    <meta property="og:title" content="Essential Composting Gear & Tools | World Composting">
    <meta property="og:description" content="Discover the best worms, bins, and tools for your composting journey via our curated gear list.">
    <meta property="og:image" content="src/assets/logo.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://worldcomposting.com/gear">
    <meta property="twitter:title" content="Essential Composting Gear & Tools | World Composting">
    <meta property="twitter:description" content="Discover the best worms, bins, and tools for your composting journey via our curated gear list.">
    <meta property="twitter:image" content="src/assets/logo.png">

    <!-- Structured Data (Schema.org) -->
    

    <link rel="stylesheet" href="src/styles/theme.css">
    </head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="mt-8 mb-12 text-center">
        <a href="index.html" class="text-sm text-[var(--ocean-blue)] hover:underline">← Back to Home</a>
        <h1 class="text-3xl font-bold mt-4 text-[var(--forest-green)]">My Composting Gear</h1>
        <p class="text-[var(--ocean-blue)] italic">The tools I use for a sustainable life</p>
    </header>

    <main id="gear-container" class="w-full max-w-md space-y-8">
        <!-- Categories and items will be injected here -->
    </main>

    <footer class="mt-16 mb-8 text-xs text-[var(--forest-green)] opacity-70 text-center">
        &copy; 2026 World Composting<br>
        As an Amazon Associate, I earn from qualifying purchases.
    </footer>

    

<script>
// Progress tracking
        let TOTAL_ITEMS = 0;

        function updateProgress() {
            const checkboxes = document.querySelectorAll('.checklist-item input[type="checkbox"]');
            TOTAL_ITEMS = checkboxes.length; // Dynamically count items on the page
            let checked = 0;
            checkboxes.forEach(cb => {
                if (cb.checked) checked++;
                const item = cb.closest('.checklist-item');
                if (item) item.classList.toggle('completed', cb.checked);
            });
            const pct = TOTAL_ITEMS > 0 ? Math.round((checked / TOTAL_ITEMS) * 100) : 0;
            document.getElementById('progress-label').textContent = `${checked} of ${TOTAL_ITEMS} items completed`;
            document.getElementById('progress-percent').textContent = `${pct}%`;
            document.getElementById('progress-fill').style.width = `${pct}%`;
        }

        // localStorage persistence
        function saveCheckbox(id, checked) {
            if (checked) {
                localStorage.setItem('checklist_progress_' + id, '1'); // Using a generic key to avoid collision/path issues
            } else {
                localStorage.remove('checklist_progress_' + id);
            }
        }

        function loadCheckboxes() {
            const checkboxes = document.querySelectorAll('.checklist-item input[type="checkbox"]');
            checkboxes.forEach(cb => {
                const saved = localStorage.getItem('checklist_progress_' + cb.dataset.id);
                if (saved === '1') cb.checked = true;
                cb.addEventListener('change', function() {
                    saveCheckbox(this.dataset.id, this.checked);
                    updateProgress();
                });
            });
            updateProgress();
        }

        // Load gear products
        async function loadGear() {
            try {
                const res = await fetch('src/data/products.json');
                if (!res.ok) throw new Error('Could not load product data.');
                const products = await res.json();
                // We'll try to find categories relevant to the current page or just show all if none found
                const list = document.getElementById('gear-list');
                if(!list) return;
                
                list.innerHTML = ''; // Clear existing
                products.forEach(p => {
                    // For simplicity in this mass fix, we'll just show products that match common patterns 
                    // or all of them if it's a general gear page.
                    const href = (p['Amazon Link'] !== 'NaN' && p['Amazon Link']) ||
                                 (p['Other Link'] !== 'NaN' && p['Other Link']) || '#';
                    const link = document.createElement('a');
                    link.href = href;
                    link.className = 'product-link';
                    link.target = '_blank';
                    link.innerHTML = '<span class="product-name">' + p['Item'] + ' (Affiliate Link)</span>';
                    list.appendChild(link);
                });
            } catch (e) {
                console.error('Error loading gear:', e);
                const list = document.getElementById('gear-list');
                if(list) list.innerHTML = '<p style="opacity:0.6;font-size:0.9rem;">Gear recommendations coming soon.</p>';
            }
        }

        // Init
        loadCheckboxes();
        loadGear();
</script>
</body>
</html>
