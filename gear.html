
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Composting | My Gear</title>
    <link rel="stylesheet" href="src/styles/theme.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Override for Gear Page specifically to keep the card look */
        .card-gradient {
            background: linear-gradient(135deg, rgba(27, 67, 50, 0.8) 0%, rgba(10, 31, 61, 0.8) 100%);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="mt-8 mb-12 text-center">
        <a href="../index.html" class="text-sm text-gray-300 hover:underline">← Back to Home</a>
        <h1 class="text-3xl font-bold mt-4 text-white">My Composting Gear</h1>
        <p class="text-gray-300 italic">The tools I use for a sustainable life</p>
    </header>

    <main id="gear-container" class="w-full max-w-md space-y-8">
        <!-- Categories and items will be injected here -->
    </main>

    <footer class="mt-16 mb-8 text-xs text-gray-40_0 text-center">
        &copy; 2026 World Composting
    </footer>

    <script>
        async function init() {
            try {
                // Fetching the products from our JSON file
                const res = await fetch('src/data/products.json');
                if (!res.ok) throw new Error("Could not load product data.");
                const products = await res.json();
                renderGear(products);
            } catch (err) {
                console.error("Error loading gear:", err);
                document.body.innerHTML += '<div class="mt-4 p-4 bg-red-900/50 text-xs rounded">Error loading gear items. Please ensure you are viewing this through a local web server.</div>';
            }
        }

        function renderGear(products) {
            const container = document.getElementById('gear-container');
            let html = '';

            // Group items by category since the JSON is a flat array
            const categories = {};
            products.forEach(item => {
                const cat = item['Category'] || 'Other';
                if (!categories[cat]) categories[cat] = [];
                categories[cat].push(item);
            });

            // Sort categories based on custom user priority, then alphabetically
            const priorityOrder = ["Worm Bin Items", "Worm Bag", "Fly Control", "Bokashi Items"];
            const sortedCategories = Object.keys(categories).sort((a, b) => {
                const aIndex = priorityOrder.indexOf(a);
                const bIndex = priorityOrder.indexOf(b);

                // If both are in the priority list, sort by their index in priorityOrder
                if (aIndex !== -1 && bIndex !== -1) return aIndex - bIndex;
                // If only A is in priority, move it up
                if (aIndex !== -1) return -1;
                // If only B is in priority, move it up
                if (bIndex !== -1) return 1;

                // Otherwise, fall back to alphabetical
                return a.localeCompare(b);
            });

            for (const category of sortedCategories) {
                const items = categories[category];
                html += `
                    <div class="space-y-3">
                        <h2 class="text-lg font-bold text-white border-b border-white/20 pb-1">${category}</h2>
                        <div class="flex flex-col gap-3">
                            ${items.map(item => `
                                <a href="${item['Amazon Link'] !== null && item['Amazon Link'] !== 'NaN' ? item['Amazon Link'] : (item['Other Link'] !== null && item['Other Link'] !== 'NaN' ? item['Other Link'] : '#')}" target="_blank" class="card-gradient flex items-center p-4 rounded-xl border border-white/5 hover:border-white/30 transition-all group">
                                    <span class="flex-grow text-sm font-medium text-left">${item['Item']}</span>
                                    <span class="text-[10px] opacity-50 group-hover:opacity-100 transition-opacity">View Item ➔</span>
                                </a>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        init();
    </script>
</body>
</html>
