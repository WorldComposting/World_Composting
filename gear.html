
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Composting | My Gear</title>
    <link rel="stylesheet" href="src/styles/theme.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Override for Gear Page specifically to keep the card look */
        .card-gradient {
            background: linear-gradient(135deg, rgba(27, 67, 50, 0.8) 0%, rgba(10, 31, 61, 0.8) 100%);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="mt-8 mb-12 text-center">
        <a href="index.html" class="text-sm text-[var(--ocean-blue)] hover:underline">← Back to Home</a>
        <h1 class="text-3xl font-bold mt-4 text-[var(--forest-green)]">My Composting Gear</h1>
        <p class="text-[var(--ocean-blue)] italic">The tools I use for a sustainable life</p>
    </header>

    <main id="gear-container" class="w-full max-w-md space-y-8">
        <!-- Categories and items will be injected here -->
    </main>

    <footer class="mt-16 mb-8 text-xs text-[var(--forest-green)] opacity-70 text-center">
        &copy; 2026 World Composting<br>
        As an Amazon Associate, I earn from qualifying purchases.
    </footer>

    <script>
        async function init() {
            try {
                const res = await fetch('src/data/products.json');
                if (!res.ok) throw new Error("Could not load product data.");
                const products = await res.json();
                renderGear(products);
            } catch (err) {
                console.error("Error loading gear:", err);
                document.body.innerHTML += '<div class="mt-4 p-4 bg-red-900/50 text-xs rounded">Error loading gear items.</div>';
            }
        }

        function renderGear(products) {
            const container = document.getElementById('gear-container');
            let html = '';

            const categories = {};
            products.forEach(item => {
                const cat = item['Category'] || 'Other';
                if (!categories[cat]) categories[cat] = [];
                categories[cat].push(item);
            });

            const priorityOrder = ["Worm Bin Items", "Worm Bag", "Fly Control", "Bokashi Items"];
            const sortedCategories = Object.keys(categories).sort((a, b) => {
                const aIndex = priorityOrder.indexOf(a);
                const bIndex = priorityOrder.indexOf(b);
                if (aIndex !== -1 && b.includes("Worm")) return -1; // Extra weight for worm keywords
                if (aIndex !== -1 && bIndex !== -1) return aIndex - bIndex;
                if (aIndex !== -1) return -1;
                if (bIndex !== -1) return 1;
                return a.localeCompare(b);
            });

            for (const category of sortedCategories) {
                const items = categories[category];
                html += `
                    <div class="space-y-3">
                        <h2 class="text-lg font-bold text-[var(--forest-green)] border-b border-[var(--forest-green)]/20 pb-1">${category}</h2>
                        <div class="flex flex-col gap-3">
                            ${items.map(item => {
                                const href = (item['Amazon Link'] !== 'NaN' && item['Amazon Link']) || 
                                             (item['Other Link'] !== 'NaN' && item['Other Link']) || '#';
                                const isAmazon = item['Amazon Link'] && item['Amazon Link'].includes('amzn.to');
                                return `
                                    <a href="${href}" target="_blank" class="product-link group">
                                        <span class="product-name">${item['Item']}${isAmazon ? ' (Affiliate Link)' : ''}</span>
                                    </a>`;
                            }).join('')}
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        init();
    </script>
</body>
</html>
