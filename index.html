
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Composting | Links</title>
    <link rel="stylesheet" href="src/styles/theme.css">
</head>
<body>
    <div id="app">
        <header>
            <img src="../public/assets/logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/100?text=WC'">
            <h1>World Composting</h1>
            <p>Turning waste into wonder.</p>
        </header>

        <div class="section-title">Latest Videos</div>
        <div id="video-list">
            <!-- Video cards will be injected here -->
        </div>

        <div class="section-title">Recommended Gear</div>
        <div id="product-list">
            <!-- Product links will be injected here -->
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const vRes = await fetch('src/data/videos.json');
                const videos = await vRes.json();
                const videoList = document.getElementById('video-list');
                
                videos.forEach(v => {
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.innerHTML = `
                        <a href="${v.url}" target="_blank">
                            <img src="${v.thumbnail}" class="video-thumbnail" alt="${v.title}">
                            <div class="video-info">
                                <span class="video-title">${v.title}</span>
                            </div>
                        </a>
                    `;
                    videoList.appendChild(card);
                });

                const pRes = await fetch('src/data/products.json');
                const products = await pRes.json();
                const prodList = document.getElementById('product-list');

                products.forEach(p => {
                    const link = document.createElement('a');
                    link.href = p.url;
                    link.className = 'product-link';
                    link.target = '_blank';
                    link.innerText = p.name;
                    prodList.appendChild(link);
                });
            } catch (e) {
                console.error("Error loading data:", e);
            }
        }
        loadData();
    </script>
</body>
</html>
